services:
  db:
    image: mysql:8.0
    container_name: sakila-compose-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - sakila-db-data:/var/lib/mysql
      - ./db/sakila-schema.sql:/docker-entrypoint-initdb.d/1-sakila-schema.sql:ro
      - ./db/sakila-data.sql:/docker-entrypoint-initdb.d/2-sakila-data.sql:ro
    networks:
      - sakila-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-compose-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
      CONNECTION_TIMEOUT: 30
      HEALTH_CHECK_INTERVAL: 10
    networks:
      - sakila-network
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    container_name: sakila-compose-adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - sakila-network
    restart: unless-stopped

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-compose-test-runner
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    networks:
      - sakila-network
    profiles:
      - test

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:
