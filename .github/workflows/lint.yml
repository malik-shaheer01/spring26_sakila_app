name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: flake8 app.py config.py --max-line-length=120 --ignore=E501,W291,W292,W293,W503,W504 --count --show-source --statistics
